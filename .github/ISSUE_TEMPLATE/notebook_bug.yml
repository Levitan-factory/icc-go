name: Notebook bug
description: Report an ICC-GO notebook behavior issue.
title: "[Notebook]: "
labels: ["notebook", "bug"]
body:
  - type: input
    id: version
    attributes:
      label: ICC-GO version
      placeholder: "v0.1.11"
    validations:
      required: true
  - type: input
    id: language
    attributes:
      label: ICC DSL version
      placeholder: "v1.04"
    validations:
      required: true
  - type: textarea
    id: cell
    attributes:
      label: Cell or notebook snippet
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
